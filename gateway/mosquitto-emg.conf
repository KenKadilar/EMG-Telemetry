# Mosquitto config for the EMG telemetry broker (local development).
# Install by copying to /etc/mosquitto/conf.d/emg.conf then: sudo systemctl restart mosquitto
#
# By default Mosquitto 2.0 listens only on localhost. These two lines let the
# ESP32 reach the broker across the LAN. Anonymous access is fine here because
# the broker stays on the home network and is never exposed to the internet;
# add authentication only if that ever changes.

listener 1883 0.0.0.0
allow_anonymous true
