<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EMG Cloud Telemetry</title>
  <style>
    body {
      margin: 0;
      background: #0e1116;
      color: #e6edf3;
      font-family: system-ui, sans-serif;
    }

    header {
      padding: 16px 20px;
      border-bottom: 1px solid #222a33;
    }

    header h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }

    header p {
      margin: 4px 0 0;
      font-size: 13px;
      color: #8b949e;
    }

    .readout {
      display: flex;
      align-items: baseline;
      gap: 14px;
      padding: 20px;
    }

    .readout .value {
      font-size: 52px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .readout .status {
      font-size: 16px;
      padding: 4px 12px;
      border-radius: 999px;
      background: #1f2731;
      color: #8b949e;
    }

    .readout .status.active {
      background: #1c3a23;
      color: #5ad07a;
    }

    canvas {
      display: block;
      width: 100%;
      height: 420px;
    }
  </style>
</head>

<body>
  <header>
    <h1>EMG Cloud Telemetry</h1>
    <p>Muscle activity level, sent from an ESP32 to AWS IoT Core and read back over a serverless API.</p>
  </header>
  <div class="readout">
    <span class="value" id="latestValue">--</span>
    <span class="status" id="statusBadge">waiting</span>
  </div>
  <canvas id="chart"></canvas>

  <script>
    const apiUrl = "https://2kq7998idi.execute-api.eu-central-1.amazonaws.com/readings";
    const activeThreshold = 40;

    const canvas = document.getElementById("chart");
    const context = canvas.getContext("2d");

    function resizeCanvas() {
      canvas.width = canvas.clientWidth;
      canvas.height = canvas.clientHeight;
    }

    function maxLevel(readings) {
      let highest = 1;
      let i = 0;
      while (i < readings.length) {
        if (readings[i].level > highest) {
          highest = readings[i].level;
        }
        i = i + 1;
      }
      return highest;
    }

    function drawChart(readings) {
      context.clearRect(0, 0, canvas.width, canvas.height);
      if (readings.length === 0) {
        return;
      }
      const top = maxLevel(readings);
      const stepX = canvas.width / (readings.length - 1);
      context.beginPath();
      context.strokeStyle = "#5ad07a";
      context.lineWidth = 2;
      let i = 0;
      while (i < readings.length) {
        const x = stepX * i;
        const y = canvas.height - (readings[i].level / top) * canvas.height;
        if (i === 0) {
          context.moveTo(x, y);
        } else {
          context.lineTo(x, y);
        }
        i = i + 1;
      }
      context.stroke();
    }

    async function refresh() {
      try {
        const reply = await fetch(apiUrl);
        const newestFirst = await reply.json();
        const readings = newestFirst.reverse();
        drawChart(readings);
        const latest = readings[readings.length - 1];
        document.getElementById("latestValue").textContent = Math.round(latest.level);
        const badge = document.getElementById("statusBadge");
        if (latest.level > activeThreshold) {
          badge.textContent = "active";
          badge.className = "status active";
        } else {
          badge.textContent = "rest";
          badge.className = "status";
        }
      } catch (err) {
        document.getElementById("statusBadge").textContent = "offline";
      }
    }

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);
    refresh();
    setInterval(refresh, 200);
  </script>
</body>

</html>
